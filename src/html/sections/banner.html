<section class="w-full min-h-[15rem] flex items-center mb-[3rem]">
  <!-- OVERLAY CONTENT -->
  <div class="eco-container">
    <div class="relative px-[4.375rem] pt-[3.4375rem] pb-[3.875rem] rounded-[0.625rem] overflow-hidden">
      <!-- BACKGROUND IMAGE -->
      <img
        src="/images/webp/bg-banner-primary.webp"
        alt="Banner background"
        class="absolute inset-0 w-full h-full object-cover -z-10"
      />

      <div class="flex flex-col flex-row items-center justify-between">
        <!-- LEFT COLUMN (55%) -->
        <div class="w-[60%]">
          <h2 class="text-[2.125rem] font-bold tracking-[0.01em] text-white">
           <span> Не нашли свое устройство?</span>
          </h2>

          <p
            class="mt-[0.9375rem] text-[1.125rem] leading-[160%] tracking-[0.03em] font-medium text-white"
          >
            Мы ремонтируем любые устройства. Напишите нам в любой мессенджер
            и узнайте полную стоимость ремонта.
          </p>
        </div>

        <!-- RIGHT COLUMN (45%) -->
        <div class="w-[45%] flex flex-row gap-[0.625rem] justify-end mt-[0.625rem]">
          <!-- WHATSAPP -->
          {{> banner-button href="#" title="WhatsApp"
          subtitle="Написать в" iconId="call" }}

          <!-- TELEGRAM -->
          {{> banner-button href="#" title="Telegram"
          subtitle="Написать в" iconId="telegram" }}
        </div>
      </div>
    </div>
  </div>
</section>
