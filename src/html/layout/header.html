<header class="w-full border-b border-gray-200">
  <!-- TOP ROW -->
  <div class="eco-container py-[1.125rem]">
    <div class="flex flex-row justify-between gap-[0.625rem]">
      <!-- LEFT BLOCK -->
      <div class="flex flex-row justify-between w-full w-[49%] gap-[0.75rem]">
        <!-- LOGO + TAGLINE -->
        <div class="flex flex-row items-center justify-between gap-[0.9375rem]">
          <a
            href="#"
            class="text-[1.5rem] font-jakarta flex items-center gap-[0.1875rem]"
          >
            <span class="text-black font-extrabold">Tech</span
            ><span class="text-primary font-semibold">Repair</span>
          </a>

          <div
            class="text-[#83858e] text-[0.875rem] leading-[130%] tracking-[0.01em] font-inter"
          >
            <span class="text-nowrap"
              >Срочный ремонт техники <br />
              в Новосибирске</span
            >
          </div>
        </div>

        <!-- ADDRESS -->
        <div class="flex flex-col translate-y-[0.25rem]">
          <!-- city -->
          <div class="flex items-center gap-[0.375rem]">
            <svg class="w-[0.9375rem] h-[1.125rem] z-10 text-primary">
              <use href="/icons/sprite/sprite.svg#location"></use>
            </svg>

            <span
              class="text-[1rem] font-semibold text-[#0f172a] tracking-[0.01em]"
            >
              Новосибирск
            </span>
          </div>

          <!-- street -->
          <div
            class="text-[#62646c] text-[0.875rem] tracking-[0.01em] text-nowrap"
          >
            ул. Секретная, д 1, офис 200
          </div>
        </div>
      </div>

      <!-- RIGHT BLOCK -->
      <div class="flex flex-row justify-between w-full w-[51%] gap-4 pl-[2.3125rem]">
        <div class="flex items-center gap-[1.25rem]">
          <!-- PHONE + CTA -->
          <div class="flex flex-col text-right">
            <div class="flex items-center gap-2 translate-y-[0.125rem]">
              <svg class="w-[1.125rem] h-[1.125rem] z-10 text-primary">
                <use href="/icons/sprite/sprite.svg#phone"></use>
              </svg>
              <span class="text-[1.125rem] font-semibold text-[#0f172a]">
                +7 (900) 123 45 67
              </span>
            </div>

            <a
              href="#"
              class="text-primary text-[0.875rem] tracking-[0.01em] font-medium hover:underline"
            >
              Заказать звонок
            </a>
          </div>

          <!-- SOCIAL BUTTONS -->
          <div class="flex items-center gap-[0.3125rem]">
            <!-- WhatsApp -->
            <a
              href="#"
              class="w-[2.8125rem] h-[2.8125rem] transition duration-300 flex items-center justify-center rounded-[0.625rem] bg-[#ECEDF4] hover:bg-primary"
            >
              <svg class="w-[1.5rem] h-[1.5rem] z-10 text-black">
                <use href="/icons/sprite/sprite.svg#telegram"></use>
              </svg>
            </a>

            <!-- Telegram -->
            <a
              href="#"
              class="w-[2.8125rem] h-[2.8125rem] transition duration-300 flex items-center justify-center rounded-[0.625rem] bg-[#ECEDF4] hover:bg-primary"
            >
              <svg class="w-[1.5rem] h-[1.5rem] z-10 text-black">
                <use href="/icons/sprite/sprite.svg#call"></use>
              </svg>
            </a>
          </div>
        </div>
        <!-- ORDER BUTTON -->
        <div class="flex items-center">
          <button
            class="bg-yelow hover:bg-yellow-300 transition duration-300 cursor-pointer tracking-[0.01em] leading-normal text-center font-semibold text-[#0f172a] text-[1rem] px-[2.1875rem] py-[0.8125rem] rounded-[0.625rem]"
          >
            <span>Заказать ремонт</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- SECOND ROW (MENU) -->
  <div class="eco-container py-[1rem]">
    <div class="flex justify-between items-center">
      <!-- LEFT MENU -->
      <nav
        class="flex items-center gap-[1.875rem] text-[1rem] font-semibold tracking-[0.01em] text-black"
      >
        <a href="#" class="flex items-center gap-[0.625rem]">
          <svg class="w-[1.5rem] h-[1.5rem] z-10 text-primary">
            <use href="/icons/sprite/sprite.svg#smartphone"></use>
          </svg>
          <span class="text-black transition duration-300 hover:text-primary"
            >Смартфоны</span
          >
        </a>

        <a href="#" class="flex items-center gap-[0.625rem]">
          <svg class="w-[1.5rem] h-[1.5rem] z-10 text-primary">
            <use href="/icons/sprite/sprite.svg#notebook"></use>
          </svg>
          <span class="text-black transition duration-300 hover:text-primary"
            >Ноутбуки</span
          >
        </a>

        <a href="#" class="flex items-center gap-[0.625rem]">
          <svg class="w-[1.5rem] h-[1.5rem] z-10 text-primary">
            <use href="/icons/sprite/sprite.svg#tablet"></use>
          </svg>
          <span class="text-black transition duration-300 hover:text-primary"
            >Планшеты</span
          >
        </a>

        <a href="#" class="flex items-center gap-[0.625rem]">
          <svg class="w-[1.5rem] h-[1.5rem] z-10 text-primary">
            <use href="/icons/sprite/sprite.svg#monoblok"></use>
          </svg>
          <span class="text-black transition duration-300 hover:text-primary"
            >Моноблоки</span
          >
        </a>

        <a href="#" class="flex items-center gap-[0.625rem]">
          <svg class="w-[1.5rem] h-[1.5rem] z-10 text-primary">
            <use href="/icons/sprite/sprite.svg#joystick"></use>
          </svg>
          <span class="text-black transition duration-300 hover:text-primary"
            >Другое</span
          >
        </a>
      </nav>

      <!-- RIGHT MENU -->
      <nav
        class="flex items-center gap-[1.8125rem] pr-[0.3125rem] text-[1rem] font-semibold tracking-[0.01em]"
      >
        <a
          href="#"
          class="text-black transition duration-300 hover:text-primary"
        >
          <span>О компании</span>
        </a>

        <a
          href="#"
          class="text-black transition duration-300 hover:text-primary"
        >
          <span>Акции</span>
        </a>

        <a
          href="#"
          class="text-black transition duration-300 hover:text-primary"
        >
          <span>Отзывы</span>
        </a>

        <a
          href="#"
          class="text-black transition duration-300 hover:text-primary"
        >
          <span>Контакты</span>
        </a>
      </nav>
    </div>
  </div>
</header>
